name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Testes (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo_sqlite, sqlite3, bcmath, gd
          coverage: none

      - name: Cache do Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Instalar dependências
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Preparar ambiente
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Correr a suite de testes
        run: vendor/bin/phpunit

  security:
    name: Auditoria de segurança (composer audit)
    runs-on: ubuntu-latest
    # Não bloqueia o merge enquanto o upgrade do Laravel 12 não estiver feito.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Instalar dependências
        run: composer install --prefer-dist --no-interaction --no-progress
      - name: composer audit
        run: composer audit
