; Limites de PHP para a app Mahungu (lido por PHP-FPM/CGI a partir do docroot).
; CRÍTICO: o sync guarda imagens como base64 dentro do JSON dos POST /api/sync/*
; (flyer capturado + imgSrc). Com o default de 8M o PHP rejeita o corpo do POST
; ("The POST data is too large") e os flyers não sincronizam / imagens não aparecem.
; Nota: o servidor embutido do `php artisan serve` NÃO lê este ficheiro — em dev
; ajustar o php.ini global; em produção (nginx/Apache + PHP-FPM) é este que conta.
post_max_size = 64M
upload_max_filesize = 64M
memory_limit = 256M
